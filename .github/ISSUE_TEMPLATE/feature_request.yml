name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What pain point or gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see (gameplay, UI, tooling, docs)?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - Narrative / dialogue
        - UI / UX
        - Audio
        - Maps / world
        - Build / CI / tooling
        - Documentation
        - Other
    validations:
      required: true
