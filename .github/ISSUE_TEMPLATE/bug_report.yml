name: Bug report
description: Something is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Security issues should **not** be filed here — see `SECURITY.md`.
  - type: input
    id: godot_version
    attributes:
      label: Godot version
      description: e.g. 4.6.stable — check Help → About
      placeholder: 4.6.stable
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Linux / Windows / macOS
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      description: Paste Godot Output or attach images if helpful.
